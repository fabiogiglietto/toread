name: Update Academic Feed

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes (reduces queue buildup)
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'config.yml'
      - 'src/**'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for committing changes

    # Prevent concurrent runs to avoid merge conflicts
    concurrency:
      group: update-feed
      cancel-in-progress: false  # Let current run finish
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Fetch full history for proper git operations

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      # requirements.lock is compiled from requirements.txt (uv pip compile);
      # regenerate it when requirements.txt changes.
      run: |
        pip install -r requirements.lock
    
    - name: Create directories
      run: |
        mkdir -p data output logs cache

    # Note: Cache is tracked in git, no need for actions/cache which can overwrite
    # the git-tracked cache with stale data

    # Slack ingest: read messages tagged with the trigger hashtag (default
    # `#zettelkasten`) from the configured channel, fetch a PDF (Slack
    # attachment / ArXiv / Unpaywall), upload it to the dedicated Drive
    # folder, and append a BibTeX entry to data/slack_inbox.bib.
    # `continue-on-error: true` so a Slack/Drive outage cannot block the
    # Paperpile refresh.
    - name: Slack ingest (#zettelkasten suggestions)
      id: slack-ingest
      continue-on-error: true
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_TOREAD_CHANNEL_ID: ${{ secrets.SLACK_TOREAD_CHANNEL_ID }}
        SLACK_INBOX_DRIVE_FOLDER_ID: ${{ secrets.SLACK_INBOX_DRIVE_FOLDER_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
        SLACK_TRIGGER_HASHTAG: ${{ vars.SLACK_TRIGGER_HASHTAG || '#zettelkasten' }}
        # Team-fork knobs (repo Actions variables; defaults = fg behavior).
        # SLACK_REQUIRE_HASHTAG=false -> dedicated-channel mode;
        # SLACK_ATTRIBUTE_SUGGESTERS=true -> publish submitter identity.
        SLACK_REQUIRE_HASHTAG: ${{ vars.SLACK_REQUIRE_HASHTAG || 'true' }}
        SLACK_ATTRIBUTE_SUGGESTERS: ${{ vars.SLACK_ATTRIBUTE_SUGGESTERS || 'false' }}
        # OAuth user creds for a My-Drive inbox folder (team fork); empty here,
        # so the service account above is used.
        GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      run: |
        python -m src.slack_ingest -v || true
        # `slack_changed` gates feed regeneration AND the downstream
        # cascade — so it must track only data/slack_inbox.bib (an actual
        # new paper). data/slack_state.json moves on every channel message
        # (cursor advance); it is still committed below, but it must not
        # cascade.
        if [ -n "$(git status --porcelain data/slack_inbox.bib 2>/dev/null)" ]; then
          echo "📥 Slack ingest added a paper"
          echo "slack_changed=true" >> $GITHUB_OUTPUT
        else
          echo "📥 Slack ingest added no papers"
          echo "slack_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Download Paperpile export
      run: |
        # Download fresh BibTeX export from Paperpile
        if [ -z "${{ secrets.PAPERPILE_EXPORT_URL }}" ]; then
          echo "Error: PAPERPILE_EXPORT_URL secret is not configured"
          echo "Please add your Paperpile export URL as a GitHub secret"
          exit 1
        fi

        echo "Downloading BibTeX export from Paperpile..."
        curl -L -H "Cache-Control: no-cache" -H "Pragma: no-cache" "${{ secrets.PAPERPILE_EXPORT_URL }}" -o /tmp/paperpile_export_new.bib

        if [ ! -f "/tmp/paperpile_export_new.bib" ] || [ ! -s "/tmp/paperpile_export_new.bib" ]; then
          echo "Error: Failed to download BibTeX file or file is empty"
          exit 1
        fi

        echo "Successfully downloaded BibTeX file ($(wc -l < /tmp/paperpile_export_new.bib) lines)"

    - name: Check if Paperpile export changed
      id: bib-check
      run: |
        # Compare with previous version
        if [ -f "data/paperpile_export.bib" ]; then
          if diff -q data/paperpile_export.bib /tmp/paperpile_export_new.bib > /dev/null 2>&1; then
            echo "📋 No changes detected in Paperpile export"
            echo "changed=false" >> $GITHUB_OUTPUT
            rm /tmp/paperpile_export_new.bib
            exit 0
          else
            echo "📋 Paperpile export has changed - showing diff summary:"
            diff --brief data/paperpile_export.bib /tmp/paperpile_export_new.bib || true

            # Count entries in both files
            old_count=$(grep -c "^@" data/paperpile_export.bib 2>/dev/null || echo "0")
            new_count=$(grep -c "^@" /tmp/paperpile_export_new.bib 2>/dev/null || echo "0")
            echo "Entries: $old_count → $new_count ($(($new_count - $old_count)))"
          fi
        else
          echo "📋 First time download - no previous export to compare"
          new_count=$(grep -c "^@" /tmp/paperpile_export_new.bib 2>/dev/null || echo "0")
          echo "Entries: $new_count"
        fi

        # Move new file into place
        mv /tmp/paperpile_export_new.bib data/paperpile_export.bib
        echo "changed=true" >> $GITHUB_OUTPUT
    
    - name: Update config with API key
      if: env.SEMANTIC_SCHOLAR_API_KEY != ''
      env:
        SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      run: |
        python -c "
        import yaml
        with open('config.yml', 'r') as f:
            config = yaml.safe_load(f)
        config['api']['semantic_scholar']['api_key'] = '${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}'
        with open('config.yml', 'w') as f:
            yaml.dump(config, f, default_flow_style=False)
        "
    
    - name: Generate feeds (fast mode for scheduled runs)
      if: github.event_name == 'schedule' && (steps.bib-check.outputs.changed == 'true' || steps.slack-ingest.outputs.slack_changed == 'true')
      run: |
        echo "Running in fast mode for scheduled execution..."
        for i in {1..3}; do
          python -m src.main data/paperpile_export.bib -o output/ \
            --feed-title "To Read - Research Papers" \
            --feed-description "Academic papers from Paperpile enriched with metadata" \
            --rate-limit 3.0 --timeout 20 --skip-cached-enrichment && break
          echo "Attempt $i failed, retrying in 30s..."
          sleep 30
        done
    
    - name: Generate feeds (full enrichment)
      if: github.event_name != 'schedule' && (steps.bib-check.outputs.changed == 'true' || steps.slack-ingest.outputs.slack_changed == 'true')
      run: |
        echo "Running full enrichment for manual/push triggers..."
        for i in {1..3}; do
          python -m src.main data/paperpile_export.bib -o output/ \
            --feed-title "To Read - Research Papers" \
            --feed-description "Academic papers from Paperpile enriched with metadata" \
            --rate-limit 2.0 --timeout 30 && break
          echo "Attempt $i failed, retrying in 60s..."
          sleep 60
        done

    # Contract enforcement — an invalid feed must never be committed or
    # cascade downstream. schema/feed.schema.json is the normative contract
    # (SCHEMA.md is commentary). Hard fail -> the failure alert fires.
    - name: Validate feed against schema
      if: steps.bib-check.outputs.changed == 'true' || steps.slack-ingest.outputs.slack_changed == 'true'
      run: check-jsonschema --schemafile schema/feed.schema.json output/feed.json

    - name: Skip feed generation (no changes)
      if: steps.bib-check.outputs.changed != 'true' && steps.slack-ingest.outputs.slack_changed != 'true'
      run: |
        echo "⏭️  Skipping feed generation - no changes in Paperpile export or Slack inbox"
        echo "This saves execution time and API quota!"
    
    - name: Check for changes
      id: git-check
      run: |
        # Ensure output directory exists and add generated files.
        # NOTE: add each path on its own line — `git add a b` aborts the
        # whole command if any pathspec is missing (e.g. slack_inbox.bib
        # before the first suggestion), which would silently drop the
        # other paths.
        mkdir -p output cache
        for f in data/paperpile_export.bib data/slack_inbox.bib data/slack_state.json output/feed.json output/feed.xml; do
          git add "$f" 2>/dev/null || true
        done
        git add cache/ 2>/dev/null || true

        # Check if there are any staged changes
        if git diff --staged --quiet; then
          echo "📋 No changes detected in feeds or BibTeX export"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "📋 Changes detected - files to commit:"
          git diff --staged --name-only
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

        # Also check for any unstaged changes that might cause issues
        if ! git diff-index --quiet HEAD --; then
          echo "⚠️  Warning: Unstaged changes detected"
          git status --short
        fi
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      shell: bash
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Prepare commit message once
        COMMIT_MSG="🤖 Update academic feeds - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

        # Push with retry logic - sync before each attempt
        for i in {1..5}; do
          echo "Push attempt $i of 5..."

          # Sync with remote before each attempt. Per-file add — a missing
          # pathspec (e.g. slack_inbox.bib) must not abort the whole add.
          git fetch origin main
          git reset --soft origin/main
          for f in data/paperpile_export.bib data/slack_inbox.bib data/slack_state.json output/feed.json output/feed.xml; do
            git add "$f" 2>/dev/null || true
          done
          git add cache/ 2>/dev/null || true

          # Check if there are actually changes to commit
          if git diff --staged --quiet; then
            echo "No changes after syncing with remote - already up to date"
            exit 0
          fi

          # Commit
          git commit -m "$COMMIT_MSG" || {
            echo "Failed to create commit"
            exit 1
          }

          # Try to push
          if git push origin main; then
            echo "✅ Successfully pushed changes"
            exit 0
          fi

          echo "❌ Push failed (attempt $i), likely due to concurrent update"

          # If we're on the last attempt, exit gracefully
          if [ $i -eq 5 ]; then
            echo "🚨 All push attempts failed after 5 tries"
            echo "This is expected when another workflow pushed first"
            echo "The next scheduled run will pick up any new changes"
            exit 0  # Exit gracefully - concurrency control will prevent issues
          fi

          # Wait with exponential backoff before retrying
          wait_time=$((5 * i))
          echo "Waiting ${wait_time}s before retry..."
          sleep $wait_time
        done

    # Pipeline orchestration — see PIPELINE.md. Fire the downstream chain
    # (fg-zettelkasten:summarize -> research-radio -> github.io ->
    # fg-zettelkasten:update) only when the Paperpile library itself changed —
    # i.e. new or edited papers. bib-check is false for cache-only metadata
    # refreshes (e.g. citation-count updates), so those no longer cascade.
    # Target/event and soft-fail come from repo Actions variables so this
    # workflow file is byte-identical in the team fork (see PIPELINE.md,
    # "The MINE team chain"). Defaults = the fg chain. mine-toread sets
    # PIPELINE_DISPATCH_REPO=fabiogiglietto/mine-zettelkasten,
    # PIPELINE_DISPATCH_EVENT=pipeline-finalize,
    # PIPELINE_DISPATCH_SOFT_FAIL=true (its kasten has a daily self-healing
    # cron, so a missing dispatch token must not fail the feed run).
    - name: Trigger downstream pipeline
      if: steps.bib-check.outputs.changed == 'true' || steps.slack-ingest.outputs.slack_changed == 'true'
      continue-on-error: ${{ vars.PIPELINE_DISPATCH_SOFT_FAIL == 'true' }}
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
        repository: ${{ vars.PIPELINE_DISPATCH_REPO || 'fabiogiglietto/fg-zettelkasten' }}
        event-type: ${{ vars.PIPELINE_DISPATCH_EVENT || 'pipeline-summarize' }}

    - name: Upload feeds as artifacts
      uses: actions/upload-artifact@v7
      with:
        name: academic-feeds
        path: output/
        retention-days: 30

    # Pipeline observability — alert on any failed run. Prefers an incoming
    # webhook (SLACK_WEBHOOK_URL), falls back to the bot token; no-ops when
    # neither is configured. Channel override: repo variable OPS_SLACK_CHANNEL.
    - name: Notify Slack on failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_ALERT_CHANNEL: ${{ vars.OPS_SLACK_CHANNEL || secrets.SLACK_TOREAD_CHANNEL_ID }}
        ALERT_TEXT: ":rotating_light: ${{ github.repository }} / ${{ github.workflow }} failed (${{ github.event_name }}): ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          jq -n --arg text "$ALERT_TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-Type: application/json' -d @- "$SLACK_WEBHOOK_URL" || true
        elif [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_ALERT_CHANNEL" ]; then
          jq -n --arg ch "$SLACK_ALERT_CHANNEL" --arg text "$ALERT_TEXT" '{channel: $ch, text: $text}' \
            | curl -sf -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" -H 'Content-Type: application/json' \
                -d @- https://slack.com/api/chat.postMessage || true
        else
          echo "No Slack credentials configured — skipping failure alert"
        fi