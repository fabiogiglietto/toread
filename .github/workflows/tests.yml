name: Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'schema/**'
      - 'requirements*'
      - '.github/workflows/tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'schema/**'
      - 'requirements*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.lock pytest

      - name: Run tests
        run: pytest tests/ -q

      - name: Validate current feed against schema
        run: check-jsonschema --schemafile schema/feed.schema.json output/feed.json
